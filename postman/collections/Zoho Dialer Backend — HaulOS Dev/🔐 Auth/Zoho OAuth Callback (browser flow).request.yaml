$kind: http-request
description: |-
  Exchanges Zoho's one-time `code` for a `refresh_token` (`src/routes/zohoOAuth.js`). Tenant slug: use `tenantId` and/or `state` (Zoho echoes `state` from the authorize URL — add `&state=kore` there). Requires `ZOHO_*_CLIENT_ID`, `ZOHO_*_CLIENT_SECRET`, and `ZOHO_*_REDIRECT_URI` or `PUBLIC_BASE_URL`. Not a Twilio webhook.
url: "{{baseUrl}}/api/v1/zoho/oauth/callback?code=PLACEHOLDER&state={{tenantId}}"
method: GET
queryParams:
  code: PLACEHOLDER
  state: "{{tenantId}}"
order: 2000
