$kind: http-request
description: Bundled sample MP3 (`voicemail-assets/default.mp3`). Served at `/voicemail-assets/*` and `/api/v1/voicemail-assets/*` (`src/server.js`) so it works behind Nginx that only proxies `/api/v1`.
url: "{{baseUrl}}/api/v1/voicemail-assets/default.mp3"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });
      pm.test('Content-Type indicates audio', function () {
        const ct = pm.response.headers.get('Content-Type') || '';
        pm.expect(ct.toLowerCase()).to.include('audio');
      });
    language: text/javascript
order: 3000
