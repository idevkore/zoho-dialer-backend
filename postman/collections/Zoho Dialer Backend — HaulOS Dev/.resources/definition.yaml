$kind: collection
description: Express API for HaulOS Zoho Dialer. Twilio webhooks use `twilioTenantContext` + `twilioWebhookAuth`. Signatures are validated unless `SKIP_TWILIO_SIG_VALIDATION` is set (see README). Token route resolves tenant via `X-Tenant-ID` (see Auth folder).
variables:
  baseUrl: https://haulos-zoho-dialer-backend.atiny.cloud
  tenantId: kore
  twilioAuthToken: ""
  twilioSignature: PLACEHOLDER_REPLACE_WITH_REAL_TWILIO_SIGNATURE
  twilioToken: ""
  voicemailTwimlSig: PLACEHOLDER_SIG_FROM_VOICEMAIL_REDIRECT_OR_twimlToken
scripts:
  - type: http:beforeRequest
    code: |-
      // Folder "📞 Twilio Webhooks" runs a pre-request script that sets X-Twilio-Signature
      // when `twilioAuthToken` is set (see README / src/middleware/twilioWebhookAuth.js).
    language: text/javascript
